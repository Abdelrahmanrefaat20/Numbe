<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Number Guessing Game</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e10;
    --surface: #1a1a1f;
    --surface2: #24242b;
    --border: #2e2e38;
    --accent: #7c6ef7;
    --accent-dim: #3d3880;
    --accent-glow: rgba(124,110,247,0.18);
    --text: #f0eff8;
    --muted: #8887a0;
    --success: #4ade80;
    --danger: #f87171;
    --warn: #fbbf24;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --radius: 12px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 480px;
  }

  .header {
    text-align: center;
    margin-bottom: 2rem;
  }

  .badge {
    display: inline-block;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    background: var(--accent-glow);
    border: 1px solid var(--accent-dim);
    border-radius: 20px;
    padding: 3px 12px;
    margin-bottom: 1rem;
    letter-spacing: 0.04em;
  }

  h1 {
    font-family: var(--mono);
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.2;
    margin-bottom: 0.5rem;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    font-size: 13px;
    color: var(--muted);
  }

  .attempts-bar {
    margin-bottom: 1.75rem;
  }

  .attempts-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
    font-family: var(--mono);
  }

  .bar-track {
    height: 6px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    transition: width 0.4s ease, background 0.3s;
    width: 100%;
  }

  .bar-fill.danger { background: var(--danger); }
  .bar-fill.warn   { background: var(--warn); }

  .input-row {
    display: flex;
    gap: 10px;
    margin-bottom: 1.25rem;
  }

  input[type="number"] {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 1.1rem;
    padding: 0.65rem 1rem;
    outline: none;
    transition: border-color 0.2s;
    -moz-appearance: textfield;
  }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
  input[type="number"]:focus { border-color: var(--accent); }
  input[type="number"]::placeholder { color: var(--muted); }

  button {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: var(--sans);
    font-size: 0.95rem;
    font-weight: 600;
    padding: 0.65rem 1.4rem;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  button:hover  { opacity: 0.88; }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .message-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.85rem 1rem;
    font-family: var(--mono);
    font-size: 0.875rem;
    color: var(--muted);
    min-height: 52px;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: border-color 0.25s, color 0.25s;
    margin-bottom: 1.5rem;
    word-break: break-word;
  }

  .message-box.correct { border-color: var(--success); color: var(--success); }
  .message-box.high    { border-color: var(--warn);    color: var(--warn); }
  .message-box.low     { border-color: #60a5fa;        color: #60a5fa; }
  .message-box.invalid { border-color: var(--danger);  color: var(--danger); }
  .message-box.lose    { border-color: var(--danger);  color: var(--danger); }

  .dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    background: currentColor;
  }

  .history {
    margin-bottom: 1.5rem;
  }

  .history-title {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }

  .history-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    min-height: 32px;
  }

  .chip {
    font-family: var(--mono);
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 99px;
    border: 1px solid var(--border);
    color: var(--muted);
    background: var(--surface2);
  }
  .chip.high    { border-color: #a16207; color: var(--warn); }
  .chip.low     { border-color: #1e40af; color: #60a5fa; }
  .chip.correct { border-color: #166534; color: var(--success); }

  .action-row {
    display: flex;
    gap: 8px;
  }
  .action-row button { flex: 1; }

  .footer-note {
    text-align: center;
    margin-top: 1.25rem;
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%      { transform: translateX(-6px); }
    40%      { transform: translateX(6px); }
    60%      { transform: translateX(-4px); }
    80%      { transform: translateX(4px); }
  }
  .shake { animation: shake 0.35s ease; }

  @keyframes pop {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.04); }
    100% { transform: scale(1); }
  }
  .pop { animation: pop 0.3s ease; }
</style>
</head>
<body>

<div class="card" id="card">
  <div class="header">
    <div class="badge">Game / Validator / Checker</div>
    <h1>Guess the <span>Number</span></h1>
    <p class="subtitle">Between 1 and 100 &mdash; you have 10 attempts</p>
  </div>

  <div class="attempts-bar">
    <div class="attempts-label">
      <span>Attempts</span>
      <span id="attempt-counter">0 / 10</span>
    </div>
    <div class="bar-track">
      <div class="bar-fill" id="bar"></div>
    </div>
  </div>

  <div class="message-box" id="msg-box">
    <div class="dot"></div>
    <span id="msg-text">Enter your guess and press &ldquo;Check&rdquo;.</span>
  </div>

  <div class="input-row">
    <input type="number" id="guess-input" min="1" max="100" placeholder="1 – 100" />
    <button id="check-btn">Check</button>
  </div>

  <div class="history">
    <div class="history-title">Guesses</div>
    <div class="history-chips" id="chips"></div>
  </div>

  <div class="action-row" id="action-row" style="display:none;">
    <button id="play-again-btn">Play again</button>
    <button class="btn-secondary" id="quit-btn">Quit</button>
  </div>
</div>

<p class="footer-note">by Abdelrahman Refaat &mdash; OOP Java &rarr; Web</p>

<script>
/* ============================================================
   Exact translation of your Java OOP structure
   ============================================================ */

/* interface Checker */
class Checker {
  isValidNumber(input) { throw new Error("Not implemented"); }
  inRange(min, max, num) { throw new Error("Not implemented"); }
}

/* class Validator implements Checker */
class Validator extends Checker {
  isValidNumber(input) {
    if (input === null || input === "") return false;
    return !isNaN(parseInt(input, 10)) && String(parseInt(input, 10)) === String(input).trim();
  }
  inRange(min, max, num) {
    return min <= num && num <= max;
  }
}

/* class Game */
class Game {
  #number;
  #attempts;
  #maxAttempts = 10;

  constructor(min, max) {
    this.#number  = Math.floor(Math.random() * (max - min + 1)) + min;
    this.#attempts = 0;
  }

  getNumber()      { return this.#number; }
  getAttempts()    { return this.#attempts; }
  getMaxAttempts() { return this.#maxAttempts; }
  getRemaining()   { return this.#maxAttempts - this.#attempts; }
  isGameOver()     { return this.#attempts >= this.#maxAttempts; }

  checkGuess(guess) {
    this.#attempts++;
    if (this.#number === guess) return "Correct";
    if (this.#number  >  guess) return "Too Low";
    return "Too High";
  }
}

/* ============================================================
   Main — UI wiring (mirrors your Main.java loop)
   ============================================================ */
const validator   = new Validator();
let   game        = new Game(1, 100);
let   gameActive  = true;

const input       = document.getElementById("guess-input");
const checkBtn    = document.getElementById("check-btn");
const msgBox      = document.getElementById("msg-box");
const msgText     = document.getElementById("msg-text");
const counter     = document.getElementById("attempt-counter");
const bar         = document.getElementById("bar");
const chips       = document.getElementById("chips");
const actionRow   = document.getElementById("action-row");
const playAgain   = document.getElementById("play-again-btn");
const quitBtn     = document.getElementById("quit-btn");
const card        = document.getElementById("card");

function setMessage(text, type) {
  msgBox.className = "message-box " + (type || "");
  msgText.textContent = text;
}

function updateBar(attempts) {
  const pct = Math.max(0, ((10 - attempts) / 10) * 100);
  bar.style.width = pct + "%";
  bar.className = "bar-fill" + (attempts >= 8 ? " danger" : attempts >= 6 ? " warn" : "");
}

function addChip(guess, result) {
  const chip = document.createElement("span");
  chip.className = "chip " + (result === "Correct" ? "correct" : result === "Too High" ? "high" : "low");
  chip.textContent = guess;
  chips.appendChild(chip);
}

function endGame(won) {
  gameActive = false;
  input.disabled = true;
  checkBtn.disabled = true;
  actionRow.style.display = "flex";
  if (won) {
    setMessage("Correct! You guessed it in " + game.getAttempts() + " attempt" + (game.getAttempts() === 1 ? "" : "s") + ".", "correct");
    card.classList.add("pop");
    setTimeout(() => card.classList.remove("pop"), 300);
  } else {
    setMessage("You lose. The number was: " + game.getNumber(), "lose");
  }
}

function handleGuess() {
  if (!gameActive) return;

  const raw = input.value.trim();

  if (!validator.isValidNumber(raw)) {
    setMessage("Invalid input — enter a whole number.", "invalid");
    input.classList.add("shake");
    setTimeout(() => input.classList.remove("shake"), 350);
    input.value = "";
    return;
  }

  const guess = parseInt(raw, 10);

  if (!validator.inRange(1, 100, guess)) {
    setMessage("Out of range — must be between 1 and 100.", "invalid");
    input.classList.add("shake");
    setTimeout(() => input.classList.remove("shake"), 350);
    input.value = "";
    return;
  }

  const result = game.checkGuess(guess);
  addChip(guess, result);
  updateBar(game.getAttempts());
  counter.textContent = game.getAttempts() + " / " + game.getMaxAttempts();
  input.value = "";

  if (result === "Correct") {
    endGame(true);
    return;
  }

  if (game.isGameOver()) {
    endGame(false);
    return;
  }

  const hint = result === "Too High" ? "Too High ↓" : "Too Low ↑";
  const type = result === "Too High" ? "high" : "low";
  setMessage(hint + " — " + game.getRemaining() + " attempt" + (game.getRemaining() === 1 ? "" : "s") + " remaining.", type);
  input.focus();
}

checkBtn.addEventListener("click", handleGuess);
input.addEventListener("keydown", e => { if (e.key === "Enter") handleGuess(); });

playAgain.addEventListener("click", () => {
  game = new Game(1, 100);
  gameActive = true;
  input.disabled = false;
  checkBtn.disabled = false;
  actionRow.style.display = "none";
  chips.innerHTML = "";
  input.value = "";
  updateBar(0);
  counter.textContent = "0 / 10";
  setMessage("New game started. Enter your guess!", "");
  input.focus();
});

quitBtn.addEventListener("click", () => {
  gameActive = false;
  input.disabled = true;
  checkBtn.disabled = true;
  actionRow.style.display = "none";
  setMessage("Thanks for playing. Refresh to start again.", "");
});

input.focus();
updateBar(0);
</script>
</body>
</html>
